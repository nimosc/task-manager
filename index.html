<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנהל משימות</title>
  <link rel="icon" type="image/png" href="LOGO1.png" sizes="32x32">
  <link rel="icon" type="image/png" href="LOGO1.png" sizes="64x64">
  <link rel="icon" type="image/png" href="LOGO1.png" sizes="128x128">
  <link rel="apple-touch-icon" href="LOGO1.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="Logo2.png" alt="Task Manager" class="logo-img">
        </div>
      </div>

      <div id="active-timer-indicator"></div>

      <nav id="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <button class="add-client-btn" onclick="showAddClientModal()">＋ לקוח חדש</button>
        <button class="icon-btn settings-footer-btn" onclick="navigateTo('settings')" title="הגדרות">⚙ הגדרות</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content"></main>

    <!-- Task Detail Panel -->
    <div id="task-panel"></div>

  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
